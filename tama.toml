[project]
name = "tama-uni-v2"
verity = "9b0114efcc0af589af63dd3f2eafcdf1a24dbf1e"

[paths]
src = "verity/src"
spec = "verity/spec"
proof = "verity/proof"
mirror_test = "test/verity"
out = "artifacts"
generated_solidity = "src/generated/verity"

[modules]
src = "TamaUniV2"
spec = "TamaUniV2.Spec"
proof = "TamaUniV2.Proof"

[yul]
solc = "0.8.33"
optimizer = true
optimizer_runs = 200
yul_optimizer = true
evm_version = "cancun"
metadata_bytecode_hash = "none"

[trust.allow_axioms]
"Classical.choice" = "Lean standard classical reasoning accepted for this project"
"propext" = "Lean standard propositional extensionality accepted for this project"
"Quot.sound" = "Lean quotient soundness accepted for this project"
"pair_create2_interface" = "Custom ECM deploys the generated UniswapV2Pair creation bytecode with CREATE2."
"pair_initialize_interface" = "Custom ECM calls initialize(address,address) on the newly deployed pair."
"uniswap_v2_callback_interface" = "Custom ECM forwards the Uniswap V2 flash-swap callback when data is non-empty."
"erc20_balanceOf_interface" = "Standard ERC20 balanceOf staticcall ECM assumption for token balances."
"erc20_transfer_interface" = "Standard ERC20 transfer ECM assumption for token transfers."

[trust.allow_surfaces]
"contractAddress" = "Used by pair operations to read token balances held by the pair contract."
"mstore" = "Used only to restore the EVM free-memory pointer to 0x80 before native event emission after ECMs that use scratch memory."
"restore free memory pointer before native events after ERC20 transfer ECMs" = "Documents the burn-path memory repair required after ERC20 transfer ECM calls and before native events."
"restore free memory pointer before native events after callback/transfer ECMs" = "Documents the swap-path memory repair required after ERC20 transfer/callback ECM calls and before native events."

[coverage.proof_only]
"UniswapV2Pair.pair_safeTransfer_traces_token_transfer" = "Pair-local ERC20 transfer wrapper records a token-transfer trace after the standard safeTransfer helper succeeds."
"UniswapV2Pair.pair_safeTransfer_event_replay_moves_token_balance" = "Pair-token transfer event replay semantics: a recorded safeTransfer event moves exactly that token amount between the recorded accounts."
"UniswapV2Pair.pair_two_safeTransfer_events_replay_move_distinct_token_balances" = "Pair-token transfer trace replay: replaying two safeTransfer events for distinct tokens moves exactly each token amount from the pair-side account to the recipient."
"UniswapV2Pair.pair_mint_revert_keeps_token_balances" = "Revert-frame token-world preservation proven directly in Lean over the exact mint run result and pair-local transfer trace model."
"UniswapV2Pair.pair_burn_revert_keeps_token_balances" = "Revert-frame token-world preservation proven directly in Lean over the exact burn run result and pair-local transfer trace model."
